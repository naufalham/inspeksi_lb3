databases:
  - name: inspeksipro-db
    databaseName: inspeksipro
    user: inspeksipro
    plan: free

services:
  - type: web
    name: inspeksipro-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: sh docker-entrypoint.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inspeksipro-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGINS
        value: '*'
