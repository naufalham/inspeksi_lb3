name: inspeksipro
description: Aplikasi Inspeksi Limbah B3
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Location
  geolocator: ^11.0.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Camera/Images
  image_picker: ^1.0.7

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
