version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inspeksipro-db
    environment:
      - POSTGRES_DB=inspeksipro
      - POSTGRES_USER=inspeksipro
      - POSTGRES_PASSWORD=inspeksipro123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inspeksipro']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inspeksipro-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://inspeksipro:inspeksipro123@postgres:5432/inspeksipro
      - JWT_ACCESS_SECRET=supersecretjwt123
      - JWT_REFRESH_SECRET=supersecretrefresh456
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=30d
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: inspeksipro-web
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
